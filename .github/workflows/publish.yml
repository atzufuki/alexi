name: Publish to JSR

on:
  push:
    tags:
      - "v*" # Trigger on version tags like v0.6.3

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write # Required for JSR publishing

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: |
          # Extract version from tag (remove 'v' prefix)
          VERSION=${GITHUB_REF_NAME#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Publishing version: $VERSION"

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Verify formatting
        run: deno fmt --check

      - name: Run linter
        run: deno lint

      - name: Run unit tests
        run: deno task test:unit

      - name: Cache Deno dependencies for E2E
        run: deno cache --unstable-kv src/create/tests/posts_e2e_test.ts

      - name: Install Playwright browsers
        run: deno run -A npm:playwright install chromium

      - name: Run E2E tests
        run: deno task test:e2e
        env:
          HEADLESS: "true"

      - name: Publish packages
        run: |
          echo "## Publishing to JSR" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Tag:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Published Packages" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          SUCCESS_COUNT=0
          FAIL_COUNT=0

          publish_package() {
            local PKG_DIR="$1"
            local PKG_PATH="$PKG_DIR/deno.jsonc"
            if [ ! -f "$PKG_PATH" ]; then
              PKG_PATH="$PKG_DIR/deno.json"
            fi

            local PKG_NAME
            PKG_NAME=$(jq -r '.name' "$PKG_PATH")

            echo "Publishing $PKG_NAME from $PKG_DIR..."

            local MAX_ATTEMPTS=5
            local ATTEMPT=0
            local OUTPUT
            local EXIT_CODE

            while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
              ATTEMPT=$((ATTEMPT + 1))
              set +e
              OUTPUT=$(cd "$PKG_DIR" && deno publish --allow-dirty --allow-slow-types --no-check 2>&1)
              EXIT_CODE=$?
              set -e

              echo "$OUTPUT"

              if [ $EXIT_CODE -eq 0 ]; then
                echo "- ✅ $PKG_NAME" >> $GITHUB_STEP_SUMMARY
                SUCCESS_COUNT=$((SUCCESS_COUNT + 1))
                return 0
              fi

              # If the error is a missing dependency, wait and retry
              if echo "$OUTPUT" | grep -q "unresolvable 'jsr:' dependency"; then
                echo "  Dependency not yet available, retrying in 15s (attempt $ATTEMPT/$MAX_ATTEMPTS)..."
                sleep 15
              else
                break
              fi
            done

            echo "- ❌ $PKG_NAME (exit code: $EXIT_CODE)" >> $GITHUB_STEP_SUMMARY
            echo "  Error: $OUTPUT" >> $GITHUB_STEP_SUMMARY
            FAIL_COUNT=$((FAIL_COUNT + 1))
          }

          # Publish in explicit topological dependency order.
          # Each package must be listed AFTER all packages it depends on.
          # Layer 0 — Primitives (no @alexi/* deps)
          publish_package "src/types"
          publish_package "src/urls"
          # Layer 1 — Data & Transport (depend on types/urls)
          publish_package "src/middleware"
          publish_package "src/mail"
          publish_package "src/db"
          publish_package "src/views"
          publish_package "src/storage"
          # Layer 2 — Application Logic (depend on layer 0/1)
          # @alexi/core depends on @alexi/storage — must come after storage
          publish_package "src/core"
          publish_package "src/staticfiles"
          publish_package "src/auth"
          publish_package "src/restframework"
          # Layer 3+ — Runtime Hosts & Infrastructure
          publish_package "src/webui"
          publish_package "src/admin"
          publish_package "src/capacitor"
          publish_package "src/create"

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "**Summary:** $SUCCESS_COUNT succeeded, $FAIL_COUNT failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "[View on JSR](https://jsr.io/@alexi)" >> $GITHUB_STEP_SUMMARY

          if [ $FAIL_COUNT -gt 0 ]; then
            exit 1
          fi
